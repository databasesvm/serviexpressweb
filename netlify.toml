[build]
  command = "git clone https://github.com/flutter/flutter.git --depth 1 -b stable /opt/flutter && export PATH=$PATH:/opt/flutter/bin && flutter pub get && flutter build web --release"
  publish = "build/web"

[build.environment]
  FLUTTER_VERSION = "stable"

[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200
