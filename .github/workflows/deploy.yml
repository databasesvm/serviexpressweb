name: Deploy Flutter Web → GitHub Pages (dual)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # ── Versión 1: operadores (login) → ROOT del sitio ───────────
      # LOGIN_MODE=false (default) → LoginScreen
      - name: Build web — operadores (Login)
        run: flutter build web --release --base-href "/serviexpressweb/"

      - name: Guardar build operadores en root
        run: |
          mkdir -p deploy
          cp -r build/web/. deploy/

      # ── Versión 2: invitados (GuestHome) → /form/ ────────────────
      # LOGIN_MODE=true → GuestHomeScreen
      - name: Build web — invitados (GuestHome)
        run: flutter build web --release --base-href "/serviexpressweb/form/" --dart-define=LOGIN_MODE=true

      - name: Guardar build invitados en /form/
        run: |
          mkdir -p deploy/form
          cp -r build/web/. deploy/form/

      # ── Deploy ambas a la rama gh-pages ───────────────────────────
      - name: Crear .nojekyll
        run: touch deploy/.nojekyll

      - name: Deploy a GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          force_orphan: true
