name: Deploy Flutter Web → GitHub Pages (dual)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # ── Versión 1: clientes/invitados → ROOT del sitio ────────────
      - name: Build web — clientes (GuestHome)
        run: flutter build web --release --base-href "/serviexpressweb/"

      - name: Guardar build clientes en root
        run: |
          mkdir -p deploy
          cp -r build/web/. deploy/

      # ── Versión 2: operadores (login) → /login/ ───────────────────
      - name: Build web — operadores (Login)
        run: flutter build web --release --base-href "/serviexpressweb/login/" --dart-define=LOGIN_MODE=true

      - name: Guardar build operadores en /login/
        run: |
          mkdir -p deploy/login
          cp -r build/web/. deploy/login/

      # ── Deploy ambas a la rama gh-pages ───────────────────────────
      - name: Crear .nojekyll
        run: touch deploy/.nojekyll

      - name: Deploy a GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          force_orphan: true
